services:
  scontrino-webapp:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY?OPENAI_API_KEY nicht gesetzt}
      - DB_PATH=/data/buchhaltung.db
    volumes:
      - buchhaltung_data:/data
    restart: unless-stopped

volumes:
  buchhaltung_data:
